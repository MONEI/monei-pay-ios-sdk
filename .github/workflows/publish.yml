name: Publish

on:
  release:
    types: [published]

jobs:
  cocoapods:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Prepare Xcode
        run: xcodebuild -runFirstLaunch || true

      - name: Publish to CocoaPods
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: pod trunk push MoneiPaySDK.podspec --allow-warnings --skip-import-validation
